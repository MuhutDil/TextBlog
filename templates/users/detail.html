{% extends "base.html" %}

{% block title %}{{ profile.username }}{% endblock %}

{% block content %}
  <h1>{{ profile.username }}</h1>
  {% if profile.username == user.username %}
    <a href="{% url 'draft' %}">Your draft post</a>
  {% endif %}
  {% include "blog/includes/truncate_post.html" with posts=posts %}
{% endblock %}

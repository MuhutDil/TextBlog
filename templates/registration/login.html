{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Log In{% endblock title %}

{% block content %}
  <h2>Log In</h2>
  <p>
    If you don't have an account <a href="{% url "signup" %}">register here</a>.
  </p>
  <div class="col-md-5">
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Log In</button>
  </form>
 </div>
  <p>
    <a href="{% url "password_reset" %}">
      Forgotten your password?
    </a>
  </p>
{% endblock content %}

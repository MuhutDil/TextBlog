{% for post in posts %}
  <hr class="border-primary border-3 opacity-75">
    <h2>
      <a class="text-decoration-none" href="{{ post.get_absolute_url }}">
        {{ post.title }}
      </a>
    </h2>
    {% include "blog/includes/post_meta.html" with post=post %}
    {{ post.body|truncatechars_html:80 }}
    
{% endfor %}

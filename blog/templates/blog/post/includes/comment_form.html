{% if user.is_authenticated %}
  <h2>Add a new comment</h2>
  <form action="{% url "blog:post_comment" post.id %}" method="post">
    {{ form.as_p }}
    {% csrf_token %}
    <p><input type="submit" value="Add comment"></p>
  </form>
{% else %}
    <h2>Please log in to comment this post.</h2>
    <!-- <a href="/login/">Login</a> -->
{% endif %}
